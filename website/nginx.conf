server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # ── Compression ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Static assets — long cache (images, fonts, css, js) ──────
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── HTML pages — short cache so updates go live quickly ───────
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Main routing ─────────────────────────────────────────────
    # 1. Try the exact file first
    # 2. Try adding .html (so /about → /about.html works)
    # 3. Fall through to 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Custom 404 page ──────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Sitemap and robots — no cache ────────────────────────────
    location ~* \.(xml|txt)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }
}
